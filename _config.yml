title: Consilient Lens
description: Writing at the intersection of ideas — where disciplines meet and patterns emerge.
url: "https://consilientlens.github.io"
baseurl: ""

# Build
theme: minima
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: page

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

header_pages: []

show_drafts: false

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - serve.bat
  - vendor/
